<footer class="footer">
    <div class="container">
        <div class="footer-wrapper">
            <p class="cite-copy">
                &copy; 2026 Прогнозирование автора текста
            </p>
            <ul class="contacts">
                {{#each contacts.author }}
                <li class="contact-item">
                    <a class="btn contact-item__link" href="{{ href }}">
                        <svg class="icon btn__icon">
                            <use xlink:href="#{{ icon }}"></use>
                        </svg>
                        <span class="btn__text">{{ text }}</span>
                    </a>
                </li>
                {{/each}}
            </ul>
        </div>
    </div> <!-- /.container -->
</footer> <!-- ./footer -->
